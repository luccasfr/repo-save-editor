minimumReleaseAge: 1440
trustPolicy: no-downgrade
trustPolicyExclude:
  - eslint-import-resolver-typescript@3.10.1
  - semver@6.3.1

allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  '@tailwindcss/oxide': true
  sharp: true
  unrs-resolver: true

overrides:
  postcss: 8.5.10
  "minimatch@10.2.4>brace-expansion": 5.0.6
